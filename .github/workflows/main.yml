name: Cordillera Agent — Run & Export

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          CORDILLERA_USE_SAMPLES: 'false'
          CORDILLERA_SOURCES: 'delegacion,lobarnechea'
          CORDILLERA_LOG_LEVEL: 'INFO'
          CORDILLERA_MAX_ARTICLES: '30'
        run: python -m cordillera run

      - name: Export status.json
        run: python export_status.py

      - name: Commit & push status.json
        run: |
          git config user.name  "Cordillera Agent [bot]"
          git config user.email "cordillera-agent@users.noreply.github.com"
          git add data/status.json
          git diff --cached --quiet || git commit -m "chore: update status.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
